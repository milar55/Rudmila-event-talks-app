<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BigQuery Release Notes & Social Share</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Main Style Sheet -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar / Tweet Generator Panel -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo-area">
                    <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
                        <polyline points="3.27 6.96 12 12.01 20.73 6.96"/>
                        <line x1="12" y1="22.08" x2="12" y2="12"/>
                    </svg>
                    <h1>BQ Pulse</h1>
                </div>
                <p class="tagline">Stay updated & share the latest BigQuery news instantly</p>
            </div>

            <div class="tweet-composer-card">
                <h3><svg class="composer-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 3a10.9 10.9 0 0 1-3.14 1.53 4.48 4.48 0 0 0-7.86 3v1A10.66 10.66 0 0 1 3 4s-4 9 5 13a11.64 11.64 0 0 1-7 2c9 5 20 0 20-11.5a4.5 4.5 0 0 0-.08-.83A7.72 7.72 0 0 0 23 3z"/></svg> Tweet Composer</h3>
                <div id="composer-empty-state" class="composer-empty">
                    <p>Select a release note from the feed to compose a Tweet.</p>
                </div>
                <div id="composer-active-state" class="composer-active hidden">
                    <div class="selected-note-preview">
                        <span id="preview-category" class="badge">Feature</span>
                        <h4 id="preview-title">Title of the selected release note</h4>
                    </div>
                    <div class="textarea-wrapper">
                        <textarea id="tweet-textarea" rows="5" maxlength="280" placeholder="What's happening?"></textarea>
                        <div class="char-counter"><span id="char-count">0</span>/280</div>
                    </div>
                    <button id="tweet-btn" class="btn btn-primary btn-full">
                        <svg viewBox="0 0 24 24" fill="currentColor" class="btn-icon"><path d="M23.953 4.57a10 10 0 01-2.825.775 4.958 4.958 0 002.163-2.723c-.951.555-2.005.959-3.127 1.184a4.92 4.92 0 00-8.384 4.482C7.69 8.095 4.067 6.13 1.64 3.162a4.822 4.822 0 00-.666 2.475c0 1.71.87 3.213 2.188 4.096a4.904 4.904 0 01-2.228-.616v.06a4.923 4.923 0 003.946 4.827 4.996 4.996 0 01-2.212.085 4.936 4.936 0 004.604 3.417 9.867 9.867 0 01-6.102 2.105c-.39 0-.779-.023-1.17-.067a13.995 13.995 0 007.557 2.209c9.053 0 13.998-7.496 13.998-13.985 0-.21 0-.42-.015-.63A9.935 9.935 0 0024 4.59z"/></svg>
                        Post to Twitter / X
                    </button>
                </div>
            </div>
            
            <div class="sidebar-footer">
                <p>Built with Flask &amp; Vanilla web tech</p>
            </div>
        </aside>

        <!-- Main Feed Section -->
        <main class="feed-section">
            <header class="feed-header">
                <div class="search-filter-row">
                    <div class="search-wrapper">
                        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
                        </svg>
                        <input type="text" id="search-input" placeholder="Search updates...">
                    </div>
                    
                    <button id="refresh-btn" class="btn btn-secondary">
                        <svg id="refresh-icon" class="refresh-icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"/>
                        </svg>
                        <span>Refresh Feed</span>
                    </button>
                </div>

                <div class="filter-tabs">
                    <button class="filter-tab active" data-category="all">All Updates</button>
                    <button class="filter-tab" data-category="Feature">Features</button>
                    <button class="filter-tab" data-category="Fix">Fixes</button>
                    <button class="filter-tab" data-category="Deprecation">Deprecations</button>
                    <button class="filter-tab" data-category="Change">Changes</button>
                </div>
            </header>

            <div class="notes-container" id="notes-container">
                <!-- Loader -->
                <div class="loader-wrapper" id="loader">
                    <div class="spinner"></div>
                    <p>Fetching latest release notes...</p>
                </div>
                <!-- Release notes cards will be injected here -->
            </div>
        </main>
    </div>

    <!-- Main JS Application -->
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
